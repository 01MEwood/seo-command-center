# ═══════════════════════════════════════════════════════
# MEOS:SEO v5.5.4 — docker-compose.yml
# Auf dem VPS: docker-compose pull && docker-compose up -d
# Images werden von GitHub Actions auf Docker Hub gepusht
# ═══════════════════════════════════════════════════════

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-seo_command}
      POSTGRES_USER: ${DB_USER:-seoadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - seo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seoadmin} -d ${DB_NAME:-seo_command}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seo_net

  backend:
    image: memario/seo-command-center-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-seoadmin}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-seo_command}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - seo_net

  frontend:
    image: memario/seo-command-center-frontend:latest
    restart: always
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seo.rule=Host(`seo.meosapp.de`)"
      - "traefik.http.routers.seo.entrypoints=websecure"
      - "traefik.http.routers.seo.tls.certresolver=myresolver"
      - "traefik.http.services.seo.loadbalancer.server.port=80"
    networks:
      - seo_net
      - root_default

volumes:
  seo_pgdata:

networks:
  seo_net:
    driver: bridge
  root_default:
    external: true
