services:
  db:
    image: postgres:16-alpine
    container_name: seo_db
    restart: always
    environment:
      POSTGRES_DB: seo_command
      POSTGRES_USER: ${DB_USER:-seoadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seoadmin -d seo_command"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-seoadmin}:${DB_PASSWORD:-changeme_in_production}@db:5432/seo_command
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN:-}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-defaultsecret123}
      CORS_ORIGIN: https://seo.meosapp.de
    networks:
      - internal
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seo-api.rule=Host(`seo.meosapp.de`) && PathPrefix(`/api`)"
      - "traefik.http.routers.seo-api.entrypoints=websecure"
      - "traefik.http.routers.seo-api.tls=true"
      - "traefik.http.routers.seo-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.seo-api.priority=2"
      - "traefik.http.services.seo-api.loadbalancer.server.port=4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seo_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seo-frontend.rule=Host(`seo.meosapp.de`)"
      - "traefik.http.routers.seo-frontend.entrypoints=websecure"
      - "traefik.http.routers.seo-frontend.tls=true"
      - "traefik.http.routers.seo-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.seo-frontend.priority=1"
      - "traefik.http.services.seo-frontend.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  root_default:
    external: true
