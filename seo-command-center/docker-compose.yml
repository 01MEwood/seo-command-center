version: '3.8'

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: seo_db
    restart: always
    environment:
      POSTGRES_DB: seo_command
      POSTGRES_USER: ${DB_USER:-seoadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-seoadmin} -d seo_command"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-seoadmin}:${DB_PASSWORD:-changeme_in_production}@db:5432/seo_command
      # Google APIs
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      # DataForSEO
      DATAFORSEO_LOGIN: ${DATAFORSEO_LOGIN}
      DATAFORSEO_PASSWORD: ${DATAFORSEO_PASSWORD}
      # AI APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # App
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://seo.schreinerhelden.de}
    ports:
      - "127.0.0.1:4000:4000"

  # ── React Frontend (built & served by Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: seo_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"

  # ── Nginx Reverse Proxy (SSL + Routing) ──
  nginx:
    image: nginx:alpine
    container_name: seo_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro

  # ── Certbot for Let's Encrypt SSL ──
  certbot:
    image: certbot/certbot
    container_name: seo_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
