name: Build & Deploy SEO Command Center

on:
  push:
    branches: [main]

env:
  FRONTEND_IMAGE: memario/seo-command-center-frontend
  BACKEND_IMAGE: memario/seo-command-center-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /opt/backups
            cd /opt/seo-command-center
            echo "=== Backup DB ==="
            docker-compose exec -T db pg_dump -U seoadmin seo_command > /opt/backups/seo_pre_deploy_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || true
            echo "=== Pull ==="
            docker-compose pull
            echo "=== Restart ==="
            docker-compose up -d
            echo "=== Health ==="
            sleep 10
            curl -sf http://localhost:4000/health && echo " Backend OK" || echo " Backend FAIL"
