name: Deploy SEO Command Center v4.1

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: 1042525
          project-name: seo-command-center
          environment-variables: |
            NODE_ENV=production
            PORT=4000
            DB_NAME=seo_command
            DB_USER=seoadmin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            CORS_ORIGIN=https://seo.meosapp.de
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }}
            DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
            DATAFORSEO_PASSWORD=${{ secrets.DATAFORSEO_PASSWORD }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
