name: Ship-It Deploy SEO Command Center

on:
  push:
    branches: [ main ]

env:
  APP_NAME: seo-command-center

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}-frontend:latest

      - name: Deploy to Hostinger
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: 1042525
          project-name: ${{ env.APP_NAME }}
          environment-variables: |
            NODE_ENV=production
            PORT=4000
            DB_NAME=seo_command
            DB_USER=seoadmin
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            CORS_ORIGIN=https://seo.meosapp.de
            JWT_SECRET=${{ secrets.JWT_SECRET }}
